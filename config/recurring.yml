production:
  # Every eight hours we load data for the most recent tournaments
  recent_tournament_results:
    class: RecentTournamentResultsJob
    args: [ 28 ]
    schedule: 35 */8 * * *

  # Many tournaments open their results at 20:59 UTC
  just_opened_tournament_results:
    class: RecentTournamentResultsJob
    args: [ 3 ]
    schedule: 0 21 * * *

  # Once a week we update results and rosters for all tournaments in the past year
  last_year_tournament_results:
    class: RecentTournamentResultsJob
    args: [ 365 ]
    schedule: every Wednesday at 14:15

  # Once a week we update results and rosters for all rating tournaments since September 2021
  all_rating_tournament_results:
    class: AllRatingTournamentResultsJob
    schedule: every Thursday at 14:15

  # Once a day we refresh metadata for recently updated tournaments
  recent_tournament_metadata:
    class: TournamentsMetadataJob
    args: [ "recently_updated" ]
    schedule: every day at 2:00

  # Once a week we update metadata for all tournaments
  all_rating_tournaments_metadata:
    class: TournamentsMetadataJob
    args: [ "all" ]
    schedule: every Wednesday at 2:15

  # Once a day we refresh metadata for tournaments starting soon
  starting_soon_tournaments_metadata:
    class: TournamentsMetadataJob
    args: [ "starting_soon" ]
    schedule: every day at 8:00

  # After that, we create notifications for tournaments breaking rules
  tournaments_breaking_rules:
    class: RulesJob
    schedule: every day at 8:15

  # Names and towns for teams
  teams:
    class: TeamsJob
    schedule: 30 16 * * *

  # Names for players
  players:
    class: PlayersJob
    schedule: every day at 10:30

  # Names of towns
  towns:
    class: TownsJob
    schedule: every day at 12:00

  # Start and end dates for seasons
  # Changes should happen at most once a year, but we recheck every week
  seasons:
    class: SeasonsJob
    schedule: every Thursday at 12:15

  base_rosters_rating_tournament:
    class: BaseRostersJob
    args: [ "from_rating_tournaments" ]
    schedule: every day at 12:05

#  base_rosters_all:
#    class: BaseRostersJob
#    args: [ "all" ]
#    schedule: every Tuesday at 14:15

  clear_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches"
    schedule: every day at 16:00

  backup:
    class: BackupJob
    schedule: every day at 23:30

  wrong_team_ids:
    class: WrongTeamIdsJob
    schedule: every day at 1:00

  # Once a week we recalculate TrueDL for all tournaments for the past year
  last_year_true_dl:
    class: TrueDLForRecentTournamentsJob
    args: [ "b", 365 ]
    schedule: every Sunday at 14:15

  # Rating calculation runs on run-once Fly machines (see RatingCalculationJob).
  # Once a week we recalculate each past season; releases are on Thursdays.
  rating_calculation_2021:
    class: RatingCalculationJob
    args: [ { first_release_date: "2021-09-09", last_release_date: "2021-12-30" } ]
    schedule: 30 1 * * MON

  rating_calculation_2022:
    class: RatingCalculationJob
    args: [ { first_release_date: "2022-01-06", last_release_date: "2022-12-29" } ]
    schedule: 30 1 * * TUE

  rating_calculation_2023:
    class: RatingCalculationJob
    args: [ { first_release_date: "2023-01-05", last_release_date: "2023-12-28" } ]
    schedule: 30 1 * * WED

  rating_calculation_2024:
    class: RatingCalculationJob
    args: [ { first_release_date: "2024-01-04", last_release_date: "2024-12-26" } ]
    schedule: 30 1 * * THU

  rating_calculation_2025:
    class: RatingCalculationJob
    args: [ { first_release_date: "2025-01-02", last_release_date: "2025-12-25" } ]
    schedule: 30 1 * * FRI

  rating_calculation_2026:
    class: RatingCalculationJob
    args: [ { first_release_date: "2026-01-01" } ]
    schedule: 30 14 * * SUN

  # Calculate ratings for the past three weeks as soon as results are open
  # (results are imported at 21:00 by just_opened_tournament_results)
  rating_calculation_three_weeks:
    class: RatingCalculationJob
    args: [ { weeks: 3 } ]
    schedule: 10 21 * * *

  # Calculate ratings for more recent tournaments a bit later
  rating_calculation_eight_weeks:
    class: RatingCalculationJob
    args: [ { weeks: 8 } ]
    schedule: 10 23 * * *
